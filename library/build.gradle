plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'maven-publish'
    id 'org.mozilla.rust-android-gradle.rust-android'
}

group = 'tachiyomiorg'

android {
    namespace 'tachiyomi.decoder'
    compileSdk 34
    ndkVersion "26.2.11394342"

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        consumerProguardFiles "consumer-rules.pro"

        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }

    // Build heifcodec (libheifcodec.so) and the C++ image decoder
    // (libimagedecoder_cpp.so) for each ABI via CMake.
    // The root CMakeLists.txt includes both sub-projects:
    //   - heifcodec:   libheif + codecs bundle (shared by C++ and Rust backends)
    //   - cppdecoder:  legacy C++ image decoder (libimagedecoder_cpp.so)
    externalNativeBuild {
        cmake {
            path "src/main/cpp/native/CMakeLists.txt"
        }
    }

    sourceSets {
        main {
            // Note: native-libs/ is noy listed here as libheifcodec.so is
            // automatically packaged by AGP from the CMake build output.
            // native-libs/ exists only so the Rust cross-linker can find
            // libheifcodec.so at build time (see .cargo/config.toml).
            //
            // Uncomment the following once the C++ decoder is removed and libheifcodec.so 
            // is the only native library:
            // jniLibs.srcDirs += ['src/main/rust/native-libs']
        }
    }

    publishing {
        singleVariant("release")
    }
}

dependencies {
}

cargo {
    module = "src/main/rust/jni"
    libname = "imagedecoder"
    targets = ["arm64", "arm", "x86", "x86_64"]
    targetDirectory = "src/main/rust/target"
    profile = "release"

    // jpegxl-rs vendored build needs the NDK path for its CMake cross-compilation.
    exec { spec, toolchain ->
        spec.environment("ANDROID_NDK_ROOT",
            android.ndkDirectory.absolutePath)
            
        // turbojpeg-sys builds libjpeg-turbo from source and requires CMake.
        // We dynamically find a CMake installation within the Android SDK and add it to PATH.
        def cmakeDirs = new File(android.sdkDirectory, "cmake").listFiles()?.findAll { new File(it, "bin/cmake").exists() }
        if (cmakeDirs) {
            def latestCmake = cmakeDirs.sort { it.name }.last()
            def cmakeBin = new File(latestCmake, "bin").absolutePath
            spec.environment("PATH", "${cmakeBin}:${System.getenv('PATH')}")
        }

        // turbojpeg-sys uses nasm to build hardware-accelerated assemblies for x86.
        // Android's strict Position Independent Code (PIC) rules reject 32-bit x86 relocations unless we explicitly compile with PIC.
        spec.environment("ASM_NASMFLAGS", "-DPIC")
    }
}

afterEvaluate {
    publishing {
        publications {
            // Creates a Maven publication called "release".
            release(MavenPublication) {
                from components.release
                groupId = 'tachiyomiorg'
                artifactId = 'image-decoder'
                version = '1.0'
            }
        }
    }

    // Ensure all cargoBuild* tasks run AFTER the CMake build tasks for heifcodec.
    tasks.matching { it.name.startsWith("cargoBuild") }.configureEach { cargoTask ->
        cargoTask.dependsOn tasks.matching { it.name.startsWith("buildCMake") }
    }

    // Explicitly hook Cargo into the Android build process.
    tasks.matching { 
        it.name.matches("merge.*JniLibFolders") || 
        it.name.matches("merge.*NativeLibs") 
    }.configureEach { task ->
        task.dependsOn tasks.matching { it.name.startsWith("cargoBuild") }
    }
}

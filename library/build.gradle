plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'maven-publish'
    id 'org.mozilla.rust-android-gradle.rust-android'
}

group = 'tachiyomiorg'

android {
    namespace 'tachiyomi.decoder'
    compileSdk 34
    ndkVersion "26.2.11394342"

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        consumerProguardFiles "consumer-rules.pro"

        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }

    // Build the heif codec bundle (libheifcodec.so) for each ABI via CMake.
    // The CMakeLists.txt outputs the .so directly into src/main/rust/native-libs/{ABI}/
    // so it is packaged by Android via jniLibs.srcDirs and
    // visible to the Rust cross-linker at the fixed path in .cargo/config.toml.
    externalNativeBuild {
        cmake {
            path "src/main/cpp/heifcodec/CMakeLists.txt"
        }
    }

    sourceSets {
        main {
            // Make AGP aware of the pre-built .so files produced by CMake above.
            jniLibs.srcDirs = ['src/main/jniLibs', 'src/main/rust/native-libs']
        }
    }

    publishing {
        singleVariant("release")
    }
}

dependencies {
}

cargo {
    module = "src/main/rust/jni"
    libname = "imagedecoder"
    targets = ["arm64", "arm", "x86", "x86_64"]
    targetDirectory = "src/main/rust/target"
}

afterEvaluate {
    publishing {
        publications {
            // Creates a Maven publication called "release".
            release(MavenPublication) {
                from components.release
                groupId = 'tachiyomiorg'
                artifactId = 'image-decoder'
                version = '1.0'
            }
        }
    }
}
